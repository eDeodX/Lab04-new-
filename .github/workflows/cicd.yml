name: CI/CD on github
on:  [push, pull_request]
jobs:
  build-linux:
    name: build with ${{ matrix.compiler }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [g++, clang++]
        include:
          - compiler: g++
            install: g++
          - compiler: clang++
            install: clang
    steps:
      - name: check code
        uses: actions/checkout@v4
      - name: Install compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ${{ matrix.install }}
      - name: configure with CMake
        run: cmake -H. -B_build -DCMAKE_CXX_COMPILER=${{ matrix.compiler }}
      - name: build project
        run: cmake --build _build
  build-windows:
    name: build with VS 
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: configure with CMakeS
        shell: cmd
        run: |
          mkdir _build
          cd _build
          cmake .. -G "Visual Studio 17 2022" -A x64
      - name: build project
        shell: cmd
        run: cmake --build _build --config Release